server:
    # If no logfile is specified, syslog is used
    # logfile: "/etc/unbound/unbound.log"
    verbosity: 1
    interface: 0.0.0.0
    access-control: 0.0.0.0/0 allow
    port: 5335
    do-ip4: yes
    do-udp: yes
    do-tcp: yes
    # May be set to yes if you have IPv6 connectivity
    do-ip6: no
    # You want to leave this to no unless you have *native* IPv6. With 6to4 and
    # Terredo tunnels your web browser should favor IPv4 for the same reasons
    prefer-ip6: no
    # Use this only when you downloaded the list of primary root servers!
    # If you use the default dns-root-data package, unbound will find it automatically
    #root-hints: "/var/lib/unbound/root.hints"
    # Trust glue only if it is within the server's authority
    harden-glue: yes
    # Require DNSSEC data for trust-anchored zones, if such data is absent, the zone becomes BOGUS
    harden-dnssec-stripped: yes
    # Prevent DNSSEC algorithm downgrade attacks
    harden-algo-downgrade: yes
    # Reject unknown records in additional sections to prevent cache poisoning
    harden-unknown-additional: yes
    # Don't use Capitalization randomization as it known to cause DNSSEC issues sometimes
    # see https://discourse.pi-hole.net/t/unbound-stubby-or-dnscrypt-proxy/9378 for further details
    use-caps-for-id: no
    # Hide resolver identity and version from queries
    hide-identity: yes
    hide-version: yes
    # Reduce EDNS reassembly buffer size.
    # Suggested by the unbound man page to reduce fragmentation reassembly problems
    edns-buffer-size: 1472
    # Perform prefetching of close to expired message cache entries
    # This only applies to domains that have been frequently queried
    prefetch: yes
    # One thread should be sufficient, can be increased on beefy machines. In reality for most users running on small networks or on a single machine, it should be unnecessary to seek performance enhancement by increasing num-threads above 1.
    num-threads: 1
    # Use system default socket buffer sizes (container lacks permissions to override)
    so-rcvbuf: 0
    # Reduce time unbound remembers a server as unreachable (default 900s).
    # Prevents long SERVFAIL caching when upstream starts after unbound.
    infra-host-ttl: 30
    # Send minimum necessary query labels to upstream (defense in depth)
    qname-minimisation: yes
    # Strip unnecessary authority/additional sections from responses
    minimal-responses: yes
    # Cache tuning
    msg-cache-size: 16m
    rrset-cache-size: 32m
    neg-cache-size: 2m
    # Serve-expired: during post-wake Tor circuit rebuild the upstream path is
    # unreachable for up to several minutes. Return stale answers immediately
    # (up to 24h old) and refresh in the background, so clients like the macOS
    # App Store don't time out while Tor reattaches to its bridges.
    serve-expired: yes
    serve-expired-ttl: 86400
    serve-expired-client-timeout: 1800
    # Ensure privacy of local IP ranges
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: 172.16.0.0/12
    private-address: 10.0.0.0/8
    private-address: fd00::/8
    private-address: fe80::/10

    tls-cert-bundle: "/etc/ssl/cert.pem"
# ---------------------------------------------------------------------------------------------
# DNS over TLS
# ---------------------------------------------------------------------------------------------
forward-zone:
    name: .
    forward-tls-upstream: yes
    
    forward-addr: 172.31.240.252@853#tor.cloudflare-dns.com
   