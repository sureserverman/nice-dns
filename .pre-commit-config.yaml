# Pre-commit hooks. Install with:
#
#   pipx install pre-commit && pre-commit install
#
# After installation, every `git commit` runs the hooks below. The most
# important one is gitleaks: it caught zero secrets when this config was
# added (post leaked-TLS-key cleanup), and it's there to make sure no
# private key, token, or password lands in a future commit.

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: check-executables-have-shebangs

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: ['--severity=warning']

  # Auto-pin install-mac.sh's CHECK_RUNTIME_SHA256 to mac/check-runtime.sh.
  # Without this, editing check-runtime.sh would leave install-mac.sh's
  # SHA-256 expectation stale and break curl-piped installs.
  - repo: local
    hooks:
      - id: pin-check-runtime-sha
        name: Re-pin check-runtime.sh SHA-256 in install-mac.sh
        entry: scripts/update-check-runtime-sha.sh
        language: script
        files: ^mac/check-runtime\.sh$
        pass_filenames: false
